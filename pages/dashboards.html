<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Dashboard</title>
</head>
<body>
  <!-- NavBar -->
  <div id="header"></div>
  <script>
    fetch('/components/header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
      })
      .catch(error => console.error('Error loading header:', error));
  </script>
  <!-- End of NavBar -->

  <!-- Dashboard Content -->
  <div class="container-fluid mt-4">
    <h1 class="mb-4">Dashboard</h1>
    
    <div class="row">
      <!-- Line Chart -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5>Monthly Sales</h5>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="lineChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5>Product Performance</h5>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="barChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <!-- Pie Chart -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5>Market Share</h5>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="pieChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Doughnut Chart -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5>Revenue Distribution</h5>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="doughnutChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- End of Dashboard Content -->

  <!-- Footer -->
  <div id="footer"></div>
  <script>
    fetch('../components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      })
      .catch(error => console.error('Error loading footer:', error));
  </script>
  <!-- End of Footer -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Line Chart
    const lineCtx = document.getElementById('lineChart').getContext('2d');
    new Chart(lineCtx, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Sales',
          data: [12000, 19000, 3000, 5000, 2000, 3000],
          borderColor: 'rgb(75, 192, 192)',
          backgroundColor: 'rgba(75, 192, 192, 0.1)',
          tension: 0.1
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });

    // Bar Chart
    const barCtx = document.getElementById('barChart').getContext('2d');
    new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: ['Product A', 'Product B', 'Product C', 'Product D'],
        datasets: [{
          label: 'Units Sold',
          data: [65, 59, 80, 81],
          backgroundColor: ['rgba(255, 99, 132, 0.7)', 'rgba(54, 162, 235, 0.7)', 'rgba(255, 206, 86, 0.7)', 'rgba(75, 192, 192, 0.7)']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });

    // Pie Chart
    const pieCtx = document.getElementById('pieChart').getContext('2d');
    new Chart(pieCtx, {
      type: 'pie',
      data: {
        labels: ['Company A', 'Company B', 'Company C'],
        datasets: [{
          data: [30, 25, 45],
          backgroundColor: [ 'rgba(255, 99, 132, 0.7)', 'rgba(54, 162, 235, 0.7)', 'rgba(255, 206, 86, 0.7)']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });

    // Doughnut Chart
    const doughnutCtx = document.getElementById('doughnutChart').getContext('2d');
    new Chart(doughnutCtx, {
      type: 'doughnut',
      data: {
        labels: ['Online', 'Retail', 'Wholesale'],
        datasets: [{
          data: [40, 35, 25],
          backgroundColor: ['rgba(75, 192, 192, 0.7)', 'rgba(153, 102, 255, 0.7)', 'rgba(255, 159, 64, 0.7)']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  </script>
  <script src="/scripts/auth.js"></script>
  <script src="/scripts/pokeapi.js"></script>
  <script>
    checkSession();
  </script>
</body>
</html>
