<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <title>Pokémons</title>
</head>
<body>
  <!-- NavBar -->
  <div id="header"></div>
  <script>
    fetch('/components/header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
      })
      .catch(error => console.error('Error loading header:', error));
  </script>
  <!-- End of NavBar -->

  <!-- Pokemon Content -->
  <div class="container-fluid pokemon-gallery">
    <div class="row">
      <div class="col-12">
        <h1 class="page-title">Pokédex</h1>
      </div>
    </div>

    <!-- Search Filters -->
    <div class="row mb-3">
      <div class="col-md-4">
        <input type="text" id="searchName" class="form-control" placeholder="Buscar por nombre...">
      </div>
      <div class="col-md-3">
        <input type="number" id="searchId" class="form-control" placeholder="Buscar por ID...">
      </div>
      <div class="col-md-2">
        <button id="clearFilters" class="btn btn-secondary w-100">Limpiar filtros</button>
      </div>
    </div>

    <!-- Type Filter -->
    <div class="row">
      <div class="col-12" id="typeFilter">
        <!-- Los botones se generan dinámicamente -->
      </div>
    </div>

    <!-- Pokemon Gallery -->
    <div class="row" id="pokemonGallery">
      <!-- Los pokemones se generan dinámicamente -->
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>
  <script>
    fetch('/components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      })
      .catch(error => console.error('Error loading footer:', error));
  </script>
  <!-- End of Footer -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <script src="../scripts/pokemon.js"></script>
</body>
</html>
